version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: mysql-container
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    ports:
      - "3307:3306"

    networks:
      - ecommerce-network

    volumes:
      - mysql-data:/var/lib/mysql
	
	

		


  redis:
    image: redis
    container_name: redis-container
    restart: always

    ports:
      - "6379:6379"

    networks:
      - ecommerce-network



  app:
    build: .
    container_name: ecommerce-app
    restart: always

    environment:
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

    ports:
      - "8080:8080"

    depends_on:
      - mysql
      - redis

    networks:
      - ecommerce-network



networks:
  ecommerce-network:



volumes:
  mysql-data: