apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:
  name: ecommerce-hpa
  namespace: ecommerce

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ecommerce-deployment

  minReplicas: 1

  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70