apiVersion: apps/v1

kind: Deployment

metadata:
  name: mysql-deployment
  namespace: ecommerce

spec:

  replicas: 1

  selector:

    matchLabels:

      app: mysql

  template:

    metadata:

      labels:

        app: mysql

    spec:

      containers:

        - name: mysql-container

          image: mysql:8

          ports:
            - containerPort: 3306
          volumeMounts : 
            - name: mysql-storage
              mountPath : /var/lib/mysql			

          env:

            - name: MYSQL_ROOT_PASSWORD

              value: root

            - name: MYSQL_DATABASE

              value: ecommerce

      volumes :
            - name : mysql-storage
              persistentVolumeClaim:
                claimName : mysql-pvc